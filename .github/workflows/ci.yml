name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Prisma generate/next build зөвхөн schema-г уншиж codegen хийдэг тул
      # жинхэнэ DB холболт шаардахгүй — bogus утга л хангалттай.
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"
      DIRECT_URL: "postgresql://ci:ci@localhost:5432/ci"
      AUTH_SECRET: "ci-placeholder-secret-not-used-in-production"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint .

      - name: Unit tests
        run: npx vitest run

      - name: Build
        run: npm run build
